# 🤖 AI Shorts Bot — YouTube Shorts Automatizados de Noticias de IA

Bot completamente automatizado que genera y publica YouTube Shorts diarios sobre las últimas noticias de Inteligencia Artificial, GPU gaming (Nvidia/AMD) y herramientas generativas de IA — **sin pagar nada**.

## ✨ ¿Qué hace exactamente?

Cada día a las 10:00 UTC, GitHub Actions:

1. **Busca noticias** de IA desde 11 feeds RSS gratuitos (TechCrunch, VentureBeat, The Verge, Tom's Hardware, OpenAI Blog, Google AI Blog, etc.)
2. **Elige la mejor noticia** usando Claude Haiku (modelo rápido y económico)
3. **Genera el guión** completo del Short con escenas, texto en pantalla y narración
4. **Crea las imágenes** con [Pollinations.ai](https://pollinations.ai) — completamente gratis, sin API key
5. **Narra el video** con Google Text-to-Speech (gTTS) en español
6. **Ensambla el video** vertical (1080×1920) con MoviePy + FFmpeg
7. **Sube automáticamente** a YouTube como Short público

